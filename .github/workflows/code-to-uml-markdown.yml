name: Code To UML Markdown

on:
  workflow_dispatch:
  push:
    branches-ignore:
      - diagram-artifacts
    paths:
      - "**/*.md"
      - "**/*.markdown"
      - "action.yml"
      - "github-action/pre-render-markdown.mjs"
      - ".github/workflows/code-to-uml-markdown.yml"

permissions:
  contents: write

concurrency:
  group: code-to-uml-markdown-${{ github.ref }}
  cancel-in-progress: false

jobs:
  pre-render:
    # The local Code To UML Docker stack must be running on this runner.
    runs-on: self-hosted
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Verify local Code To UML
        shell: powershell
        run: |
          $response = Invoke-WebRequest -Uri 'http://localhost:8000/health' -UseBasicParsing -TimeoutSec 15
          if ($response.StatusCode -ne 200) { throw "Code To UML health check failed: HTTP $($response.StatusCode)" }

      - name: Render Markdown code blocks
        id: diagrams
        uses: ./
        with:
          mode: pre-render
          server-url: http://localhost:8000
          api-key: ${{ secrets.CODE_TO_UML_API_KEY }}
          markdown-output: .code-to-uml/rendered

      - name: Upload rendered SVG files
        uses: actions/upload-artifact@v4
        with:
          name: code-to-uml-markdown-${{ github.sha }}
          path: .code-to-uml/rendered
          if-no-files-found: ignore

      - name: Commit generated previews
        shell: powershell
        run: |
          git config user.name "code-to-uml[bot]"
          git config user.email "code-to-uml[bot]@users.noreply.github.com"
          git add -A -- .
          if (git diff --cached --quiet) {
            Write-Host "Markdown previews are already up to date."
            exit 0
          }
          git commit -m "docs(diagram): update generated previews"
          git push origin "HEAD:$env:GITHUB_REF_NAME"
