name: Code To UML
description: Render diagrams, pre-render Markdown, or create a semantic diagram change map for a pull request
inputs:
  mode:
    description: render, pre-render, or pr-diff
    default: render
  server-url:
    description: Code To UML base URL
    required: true
  api-key:
    description: Optional API key for a protected hosted service; omit for local mode
    required: false
  engine:
    description: Diagram engine, for example plantuml or mermaid
    required: false
  format:
    description: svg, png, pdf, jpeg or txt
    default: svg
  source:
    description: Source diagram file
    required: false
  output:
    description: Output file
    required: false
  diff-output:
    description: SVG path generated by PR diff mode
    default: artifacts/diagram-pr-diff.svg
  github-token:
    description: GITHUB_TOKEN used to comment on the pull request
    required: false
  comment:
    description: Post a pull request summary comment
    default: "true"
  artifact-branch:
    description: Branch used to store PR diff SVG and PNG images
    default: diagram-artifacts
  markdown-output:
    description: Repository directory for committed Markdown SVG previews
    default: .code-to-uml/rendered
outputs:
  changed:
    description: Whether diagram files changed in PR diff mode
    value: ${{ steps.pr-diff.outputs.changed }}
  diagram-count:
    description: Number of changed diagram files
    value: ${{ steps.pr-diff.outputs.diagram-count }}
  added:
    description: Number of added semantic nodes
    value: ${{ steps.pr-diff.outputs.added }}
  modified:
    description: Number of modified semantic nodes
    value: ${{ steps.pr-diff.outputs.modified }}
  removed:
    description: Number of removed semantic nodes
    value: ${{ steps.pr-diff.outputs.removed }}
  output:
    description: Generated artifact path
    value: ${{ steps.pr-diff.outputs.output }}
  image-url:
    description: Raw GitHub URL embedded in the pull request comment
    value: ${{ steps.pr-diff.outputs.image-url }}
  rendered:
    description: Number of Markdown diagrams rendered in pre-render mode
    value: ${{ steps.pre-render.outputs.rendered }}
  failed:
    description: Number of invalid Markdown diagrams skipped in pre-render mode
    value: ${{ steps.pre-render.outputs.failed }}
runs:
  using: composite
  steps:
    - name: Render diagram
      if: inputs.mode == 'render'
      shell: powershell
      env:
        CTU_SERVER: ${{ inputs.server-url }}
        CTU_API_KEY: ${{ inputs.api-key }}
        CTU_ENGINE: ${{ inputs.engine }}
        CTU_FORMAT: ${{ inputs.format }}
        CTU_SOURCE: ${{ inputs.source }}
        CTU_OUTPUT: ${{ inputs.output }}
      run: node "${{ github.action_path }}/github-action/render-file.mjs"
    - name: Build pull request diagram diff
      id: pr-diff
      if: inputs.mode == 'pr-diff'
      shell: powershell
      env:
        CTU_SERVER: ${{ inputs.server-url }}
        CTU_API_KEY: ${{ inputs.api-key }}
        CTU_DIFF_OUTPUT: ${{ inputs.diff-output }}
        CTU_COMMENT: ${{ inputs.comment }}
        CTU_ARTIFACT_BRANCH: ${{ inputs.artifact-branch }}
        GITHUB_TOKEN: ${{ inputs.github-token }}
      run: node "${{ github.action_path }}/github-action/pr-diagram-diff.mjs"
    - name: Pre-render Markdown diagrams
      id: pre-render
      if: inputs.mode == 'pre-render'
      shell: powershell
      env:
        CTU_SERVER: ${{ inputs.server-url }}
        CTU_API_KEY: ${{ inputs.api-key }}
        CTU_MARKDOWN_OUTPUT: ${{ inputs.markdown-output }}
      run: node "${{ github.action_path }}/github-action/pre-render-markdown.mjs"
    - name: Upload diagram change map
      if: inputs.mode == 'pr-diff' && steps.pr-diff.outputs.changed == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: code-to-uml-pr-diff
        path: |
          ${{ inputs.diff-output }}
          artifacts/pr-diagrams
        if-no-files-found: error
